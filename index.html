<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="房贷计算器">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231e3c72'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial'%3E🏠%3C/text%3E%3C/svg%3E">
    <title>房贷计算器 · 等额本息/本金 · 组合贷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #eef2f7;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px 12px 32px;
            color: #1a2c3e;
        }

        /* 主容器 */
        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.85rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3c72, #2b4f8c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .header p {
            font-size: 0.75rem;
            color: #5b6e8c;
            margin-top: 6px;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
            padding: 20px 18px;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }

        /* 表单项 */
        .field-row {
            margin-bottom: 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .field-label {
            width: 100px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #2c3e50;
        }
        .field-control {
            flex: 1;
            min-width: 140px;
        }
        select, input {
            width: 100%;
            padding: 12px 14px;
            font-size: 0.9rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            background: #ffffff;
            transition: 0.2s;
            font-family: inherit;
            outline: none;
        }
        select:focus, input:focus {
            border-color: #2b6a9e;
            box-shadow: 0 0 0 3px rgba(43, 106, 158, 0.15);
        }
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
        }
        .radio-group label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2d3e50;
            background: #f8fafc;
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #e2edf2;
            cursor: pointer;
            transition: all 0.1s;
        }
        .radio-group input[type="radio"] {
            width: 16px;
            height: 16px;
            margin: 0;
            accent-color: #1e3c72;
        }
        .radio-group label:has(input:checked) {
            background: #e9f0f9;
            border-color: #2b6a9e;
            color: #1e3c72;
        }

        /* 组合贷专属区块 */
        .combo-box {
            background: #f9fbfe;
            border-radius: 24px;
            padding: 14px 16px;
            margin: 12px 0 8px;
            border: 1px solid #e9edf2;
        }
        .combo-title {
            font-weight: 600;
            font-size: 0.8rem;
            color: #1e3c72;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .combo-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }
        .combo-row .sub-label {
            width: 70px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #3a5a78;
        }
        .combo-row .sub-input {
            flex: 1;
            min-width: 110px;
        }
        .sub-input input {
            padding: 10px 12px;
            font-size: 0.85rem;
        }

        hr {
            margin: 14px 0;
            border: none;
            border-top: 1px solid #eef2f8;
        }

        /* 按钮 */
        .calc-btn {
            background: #1e3c72;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 44px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            margin-bottom: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .calc-btn:active {
            transform: scale(0.97);
            background: #0f2b4f;
        }

        /* 结果区域 */
        .result-card {
            background: #ffffff;
        }
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 16px;
            margin-top: 8px;
        }
        .result-item {
            background: #fafcff;
            border-radius: 20px;
            padding: 10px 12px;
            border: 1px solid #eef2fa;
        }
        .result-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #6a7c94;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }
        .result-value {
            font-size: 1rem;
            font-weight: 700;
            color: #1a344f;
            word-break: break-word;
            line-height: 1.3;
        }
        .result-value.small-note {
            font-size: 0.75rem;
            font-weight: normal;
            color: #2d6a4f;
        }
        .footnote {
            margin-top: 16px;
            text-align: center;
            font-size: 0.7rem;
            color: #7c8ea0;
            background: #f8fafc;
            padding: 10px;
            border-radius: 20px;
        }

        /* 辅助 */
        .text-muted {
            font-size: 0.7rem;
            color: #8ca0b5;
            margin-left: 8px;
        }
        .inline-hint {
            font-size: 0.7rem;
            color: #7f8fa4;
        }
        @media (max-width: 480px) {
            .field-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .field-label {
                width: auto;
                margin-bottom: 4px;
            }
            .field-control {
                width: 100%;
            }
            .radio-group {
                width: 100%;
                justify-content: space-between;
            }
            .result-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏠 房贷计算器</h1>
        <p>等额本息 · 等额本金 | 商贷/公积金/组合贷</p>
    </div>

    <!-- 输入卡片 -->
    <div class="card">
        <!-- 计算方式固定为贷款总额 -->
        <div class="field-row">
            <div class="field-label">📐 计算方式</div>
            <div class="field-control">
                <select id="calcMethod" disabled style="background:#f4f6fa; color:#2d3e50;">
                    <option>以贷款总额计算</option>
                </select>
            </div>
        </div>

        <!-- 贷款类别 -->
        <div class="field-row">
            <div class="field-label">🏦 贷款类别</div>
            <div class="field-control radio-group" id="loanTypeGroup">
                <label>
                    <input type="radio" name="loanType" value="商贷" checked> 商贷
                </label>
                <label>
                    <input type="radio" name="loanType" value="公积金贷"> 公积金贷
                </label>
                <label>
                    <input type="radio" name="loanType" value="组合贷款"> 组合贷款
                </label>
            </div>
        </div>

        <!-- 还款方式 -->
        <div class="field-row">
            <div class="field-label">💳 还款方式</div>
            <div class="field-control radio-group" id="repayGroup">
                <label>
                    <input type="radio" name="repayMethod" value="等额本息" checked> 等额本息
                </label>
                <label>
                    <input type="radio" name="repayMethod" value="等额本金"> 等额本金
                </label>
            </div>
        </div>

        <!-- 贷款总额(万) -->
        <div class="field-row">
            <div class="field-label">💰 贷款总额</div>
            <div class="field-control">
                <input type="number" id="totalAmountWan" value="100" step="1" placeholder="单位：万元">
                <span class="inline-hint"> 万元</span>
            </div>
        </div>

        <!-- 按揭年限 -->
        <div class="field-row">
            <div class="field-label">📅 按揭年限</div>
            <div class="field-control">
                <select id="loanYears"></select>
                <span class="inline-hint"> 年</span>
            </div>
        </div>

        <!-- 组合贷款详细区域 (动态显示/隐藏) -->
        <div id="comboArea" style="display: none;">
            <div class="combo-box">
                <div class="combo-title">🏢 商业贷款部分</div>
                <div class="combo-row">
                    <span class="sub-label">金额(万元)</span>
                    <div class="sub-input"><input type="number" id="commercialWan" value="50" step="5"></div>
                    <span class="sub-label">利率(%)</span>
                    <div class="sub-input"><input type="number" id="commercialRate" value="3.2" step="0.05"></div>
                </div>
                <div class="combo-title">🏦 公积金贷款部分</div>
                <div class="combo-row">
                    <span class="sub-label">金额(万元)</span>
                    <div class="sub-input"><input type="number" id="fundWan" value="50" step="5"></div>
                    <span class="sub-label">利率(%)</span>
                    <div class="sub-input"><input type="number" id="fundRate" value="2.6" step="0.05"></div>
                </div>
            </div>
        </div>

        <!-- 单一利率输入 (商贷/公积金贷) -->
        <div id="singleRateArea">
            <div class="field-row">
                <div class="field-label">📈 贷款利率</div>
                <div class="field-control">
                    <input type="number" id="singleRate" value="3.2" step="0.05" placeholder="年利率 %">
                    <span class="inline-hint"> %</span>
                </div>
            </div>
        </div>

        <button class="calc-btn" id="calcBtn">🔍 立即计算</button>
    </div>

    <!-- 结果卡片 -->
    <div class="card result-card">
        <div style="font-weight: 600; margin-bottom: 14px;">📋 计算结果明细</div>
        <div class="result-grid" id="resultGrid">
            <div class="result-item"><div class="result-label">计算方式</div><div class="result-value" id="calcWayVal">--</div></div>
            <div class="result-item"><div class="result-label">贷款类别</div><div class="result-value" id="loanCatVal">--</div></div>
            <div class="result-item"><div class="result-label">贷款总额</div><div class="result-value" id="totalLoanVal">--</div></div>
            <div class="result-item"><div class="result-label">贷款利率</div><div class="result-value" id="loanRateVal">--</div></div>
            <div class="result-item"><div class="result-label">还款总额</div><div class="result-value" id="totalPayVal">--</div></div>
            <div class="result-item"><div class="result-label">支付利息</div><div class="result-value" id="totalIntVal">--</div></div>
            <div class="result-item"><div class="result-label">贷款期数</div><div class="result-value" id="periodsVal">--</div></div>
            <div class="result-item"><div class="result-label">月均还款</div><div class="result-value" id="monthlyVal">--</div></div>
        </div>
        <div class="footnote" id="detailNote">等额本息模式下每月还款额相同；等额本金逐月递减。</div>
    </div>
</div>

<script>
    // 动态生成年限 1-50
    const yearSelect = document.getElementById('loanYears');
    for (let i = 1; i <= 50; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = i + ' 年';
        if (i === 30) option.selected = true;
        yearSelect.appendChild(option);
    }

    // DOM 元素
    const loanTypeRadios = document.querySelectorAll('input[name="loanType"]');
    const repayRadios = document.querySelectorAll('input[name="repayMethod"]');
    const comboArea = document.getElementById('comboArea');
    const singleRateArea = document.getElementById('singleRateArea');
    const totalAmountInput = document.getElementById('totalAmountWan');
    const singleRateInput = document.getElementById('singleRate');
    const commercialWan = document.getElementById('commercialWan');
    const commercialRate = document.getElementById('commercialRate');
    const fundWan = document.getElementById('fundWan');
    const fundRate = document.getElementById('fundRate');

    // 结果字段
    const calcWayVal = document.getElementById('calcWayVal');
    const loanCatVal = document.getElementById('loanCatVal');
    const totalLoanVal = document.getElementById('totalLoanVal');
    const loanRateVal = document.getElementById('loanRateVal');
    const totalPayVal = document.getElementById('totalPayVal');
    const totalIntVal = document.getElementById('totalIntVal');
    const periodsVal = document.getElementById('periodsVal');
    const monthlyVal = document.getElementById('monthlyVal');
    const detailNote = document.getElementById('detailNote');

    // 切换组合贷 / 单一利率区域
    function toggleLoanTypeUI() {
        let selected = null;
        for (let radio of loanTypeRadios) {
            if (radio.checked) selected = radio.value;
        }
        if (selected === '组合贷款') {
            comboArea.style.display = 'block';
            singleRateArea.style.display = 'none';
        } else {
            comboArea.style.display = 'none';
            singleRateArea.style.display = 'block';
        }
    }

    loanTypeRadios.forEach(radio => radio.addEventListener('change', toggleLoanTypeUI));
    toggleLoanTypeUI();

    // 辅助函数: 等额本息月供 & 总额
    function calcEqualPayment(principal, monthlyRate, months) {
        if (monthlyRate === 0) {
            const monthPay = principal / months;
            return { monthPay, totalPay: principal, totalInterest: 0 };
        }
        const factor = Math.pow(1 + monthlyRate, months);
        const monthPay = principal * (monthlyRate * factor) / (factor - 1);
        const totalPay = monthPay * months;
        const totalInterest = totalPay - principal;
        return { monthPay, totalPay, totalInterest };
    }

    // 等额本金计算：返回总还款额、总利息、首月还款额、末月还款额、月递减额
    function calcEqualPrincipal(principal, monthlyRate, months) {
        if (months === 0) return { totalPay: principal, totalInterest: 0, firstMonth: 0, lastMonth: 0, decline: 0 };
        const principalPerMonth = principal / months;
        let remaining = principal;
        let totalInterest = 0;
        let firstMonthPayment = 0;
        let lastMonthPayment = 0;
        for (let i = 0; i < months; i++) {
            const interest = remaining * monthlyRate;
            totalInterest += interest;
            const payment = principalPerMonth + interest;
            if (i === 0) firstMonthPayment = payment;
            if (i === months - 1) lastMonthPayment = payment;
            remaining -= principalPerMonth;
        }
        const totalPay = principal + totalInterest;
        const decline = principalPerMonth * monthlyRate;
        return { totalPay, totalInterest, firstMonth: firstMonthPayment, lastMonth: lastMonthPayment, decline };
    }

    // 格式化数字
    function formatMoney(val) {
        return val.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // 主要计算逻辑
    function calculate() {
        try {
            // 获取贷款类别 & 还款方式
            let loanCategory = '';
            for (let radio of loanTypeRadios) {
                if (radio.checked) { loanCategory = radio.value; break; }
            }
            let repayMethod = '';
            for (let radio of repayRadios) {
                if (radio.checked) { repayMethod = radio.value; break; }
            }
            const years = parseInt(yearSelect.value);
            if (isNaN(years) || years < 1 || years > 50) {
                alert('请选择有效的按揭年限 (1-50年)');
                return;
            }
            const months = years * 12;

            // 组合贷款模式
            if (loanCategory === '组合贷款') {
                let commercialAmtWan = parseFloat(commercialWan.value);
                let fundAmtWan = parseFloat(fundWan.value);
                if (isNaN(commercialAmtWan)) commercialAmtWan = 0;
                if (isNaN(fundAmtWan)) fundAmtWan = 0;
                const commercialPrincipal = commercialAmtWan * 10000;
                const fundPrincipal = fundAmtWan * 10000;
                const totalPrincipal = commercialPrincipal + fundPrincipal;
                if (totalPrincipal <= 0) {
                    alert('组合贷款总额必须大于0');
                    return;
                }
                const commercialAnnual = parseFloat(commercialRate.value) / 100;
                const fundAnnual = parseFloat(fundRate.value) / 100;
                if (isNaN(commercialAnnual) || isNaN(fundAnnual)) throw new Error('利率无效');
                const commercialMonthly = commercialAnnual / 12;
                const fundMonthly = fundAnnual / 12;

                let totalPayment = 0, totalInterest = 0;
                let monthlyDisplay = '';
                let detailMsg = '';

                if (repayMethod === '等额本息') {
                    const comRes = calcEqualPayment(commercialPrincipal, commercialMonthly, months);
                    const fundRes = calcEqualPayment(fundPrincipal, fundMonthly, months);
                    totalPayment = comRes.totalPay + fundRes.totalPay;
                    totalInterest = comRes.totalInterest + fundRes.totalInterest;
                    const combinedMonth = comRes.monthPay + fundRes.monthPay;
                    monthlyDisplay = `${formatMoney(combinedMonth)} 元`;
                    detailMsg = `等额本息 · 组合贷月供 = 商贷${formatMoney(comRes.monthPay)} + 公积金${formatMoney(fundRes.monthPay)}`;
                } else { // 等额本金
                    const comRes = calcEqualPrincipal(commercialPrincipal, commercialMonthly, months);
                    const fundRes = calcEqualPrincipal(fundPrincipal, fundMonthly, months);
                    totalPayment = comRes.totalPay + fundRes.totalPay;
                    totalInterest = comRes.totalInterest + fundRes.totalInterest;
                    const firstTotal = comRes.firstMonth + fundRes.firstMonth;
                    monthlyDisplay = `首月 ${formatMoney(firstTotal)} 元`;
                    detailMsg = `等额本金 · 首月合计 ${formatMoney(firstTotal)} 元，每月递减约 ${formatMoney(comRes.decline + fundRes.decline)} 元`;
                }

                // 加权展示利率
                const weightedRate = ((commercialPrincipal * commercialAnnual) + (fundPrincipal * fundAnnual)) / totalPrincipal;
                const rateShow = `商贷${(commercialAnnual*100).toFixed(2)}% / 公积金${(fundAnnual*100).toFixed(2)}% (加权${(weightedRate*100).toFixed(2)}%)`;
                // 更新UI
                calcWayVal.innerText = '以贷款总额计算';
                loanCatVal.innerText = '组合贷款';
                totalLoanVal.innerText = `${(totalPrincipal/10000).toFixed(2)} 万元`;
                loanRateVal.innerText = rateShow;
                totalPayVal.innerText = `${formatMoney(totalPayment)} 元`;
                totalIntVal.innerText = `${formatMoney(totalInterest)} 元`;
                periodsVal.innerText = `${months} 个月`;
                monthlyVal.innerText = monthlyDisplay;
                detailNote.innerText = detailMsg;
                return;
            }

            // ---------- 单一贷款 (商贷 / 公积金) ----------
            let totalWan = parseFloat(totalAmountInput.value);
            if (isNaN(totalWan) || totalWan <= 0) {
                alert('请输入有效的贷款总额（万元）');
                return;
            }
            const principal = totalWan * 10000;
            let annualRate = parseFloat(singleRateInput.value);
            if (isNaN(annualRate) || annualRate < 0) {
                alert('请输入有效的年利率（%）');
                return;
            }
            const monthlyRate = annualRate / 100 / 12;
            let totalPayment = 0, totalInterest = 0;
            let monthlyDisplay = '';
            let detailMsg = '';

            if (repayMethod === '等额本息') {
                const { monthPay, totalPay, totalInterest: interest } = calcEqualPayment(principal, monthlyRate, months);
                totalPayment = totalPay;
                totalInterest = interest;
                monthlyDisplay = `${formatMoney(monthPay)} 元`;
                detailMsg = `等额本息 · 每月固定还款 ${formatMoney(monthPay)} 元`;
            } else { // 等额本金
                const { totalPay, totalInterest: interest, firstMonth, lastMonth, decline } = calcEqualPrincipal(principal, monthlyRate, months);
                totalPayment = totalPay;
                totalInterest = interest;
                monthlyDisplay = `首月 ${formatMoney(firstMonth)} 元`;
                detailMsg = `等额本金 · 首月 ${formatMoney(firstMonth)} 元，末月 ${formatMoney(lastMonth)} 元，每月递减约 ${formatMoney(decline)} 元`;
            }

            const rateShow = `${annualRate.toFixed(2)}%`;
            calcWayVal.innerText = '以贷款总额计算';
            loanCatVal.innerText = loanCategory;
            totalLoanVal.innerText = `${totalWan.toFixed(2)} 万元`;
            loanRateVal.innerText = rateShow;
            totalPayVal.innerText = `${formatMoney(totalPayment)} 元`;
            totalIntVal.innerText = `${formatMoney(totalInterest)} 元`;
            periodsVal.innerText = `${months} 个月`;
            monthlyVal.innerText = monthlyDisplay;
            detailNote.innerText = detailMsg;

        } catch (err) {
            console.error(err);
            alert('计算出错，请检查输入数值');
        }
    }

    // 绑定计算按钮
    const calcBtn = document.getElementById('calcBtn');
    calcBtn.addEventListener('click', calculate);
    // 页面加载时自动计算一次
    window.addEventListener('DOMContentLoaded', () => {
        calculate();
    });
</script>
</body>
</html>
